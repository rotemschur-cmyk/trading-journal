<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>יומן מסחר</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#07080f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="יומן מסחר">
<link rel="apple-touch-icon" href="icon.svg">

<style>
/* ══════════════════════════════════════════════ */
/* RESET                                          */
/* ══════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ══════════════════════════════════════════════ */
/* BASE                                           */
/* ══════════════════════════════════════════════ */
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  /* Rich deep-space background with subtle grid */
  background-color:#07080f;
  background-image:
    linear-gradient(rgba(240,192,64,.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(240,192,64,.022) 1px,transparent 1px),
    radial-gradient(ellipse 90% 60% at 10% 0%,rgba(240,192,64,.08) 0%,transparent 55%),
    radial-gradient(ellipse 70% 50% at 90% 100%,rgba(63,185,80,.06) 0%,transparent 50%),
    radial-gradient(ellipse 50% 50% at 50% 50%,rgba(56,139,255,.03) 0%,transparent 70%),
    linear-gradient(170deg,#07080f 0%,#0b1120 50%,#080e18 100%);
  background-size:52px 52px,52px 52px,100% 100%,100% 100%,100% 100%,100% 100%;
  color:#dde6f5;
  min-height:100vh;
  direction:rtl;
  padding-bottom:env(safe-area-inset-bottom);
  overflow-x:hidden;
}

/* ══════════════════════════════════════════════ */
/* ANIMATIONS                                     */
/* ══════════════════════════════════════════════ */
@keyframes spin   {to{transform:rotate(360deg)}}
@keyframes fadeUp {from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse  {0%,100%{opacity:1}50%{opacity:.45}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}

/* ══════════════════════════════════════════════ */
/* LOADING                                        */
/* ══════════════════════════════════════════════ */
#screen-loading{
  position:fixed;inset:0;background:#07080f;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;z-index:200
}
.spin{
  width:46px;height:46px;
  border:3px solid rgba(240,192,64,.12);
  border-top-color:#f0c040;
  border-radius:50%;
  animation:spin .75s linear infinite;
  box-shadow:0 0 20px rgba(240,192,64,.25);
}
#screen-loading p{color:#3a4a62;font-size:13px;letter-spacing:1.5px;animation:pulse 1.8s ease infinite}

/* ══════════════════════════════════════════════ */
/* LOGIN                                          */
/* ══════════════════════════════════════════════ */
#screen-login{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 120% 80% at 50% 50%,rgba(240,192,64,.05) 0%,transparent 65%),
    #07080f;
  display:none;align-items:center;justify-content:center;z-index:100;padding:24px
}
.login-card{
  background:rgba(255,255,255,.035);
  border:1px solid rgba(240,192,64,.18);
  border-radius:22px;
  padding:52px 44px;
  text-align:center;max-width:390px;width:100%;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  box-shadow:0 0 80px rgba(240,192,64,.07),0 32px 64px rgba(0,0,0,.5);
  animation:fadeUp .45s ease;
}
.login-card .icon{font-size:58px;margin-bottom:20px;display:block;filter:drop-shadow(0 0 16px rgba(240,192,64,.5))}
.login-card h1{
  font-size:30px;font-weight:900;margin-bottom:12px;
  background:linear-gradient(135deg,#ffd666 0%,#f0c040 60%,#c89800 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.login-card>p{color:#4a5a78;font-size:14px;margin-bottom:34px;line-height:1.65}
.btn-google{
  display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
  background:#fff;color:#1a1a2e;border:none;border-radius:12px;
  padding:14px 20px;font-size:15px;font-weight:700;cursor:pointer;
  transition:all .25s;box-shadow:0 4px 20px rgba(0,0,0,.35);
}
.btn-google:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.45)}
.btn-google svg{flex-shrink:0}
.login-note{margin-top:22px;font-size:12px;color:#2e3a50;line-height:1.6}

/* ══════════════════════════════════════════════ */
/* APP                                            */
/* ══════════════════════════════════════════════ */
#screen-app{display:none;min-height:100vh}

/* ══════════════════════════════════════════════ */
/* NAV                                            */
/* ══════════════════════════════════════════════ */
nav{
  background:rgba(7,8,15,.88);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(240,192,64,.1);
  display:flex;align-items:center;
  padding:0 22px;gap:2px;
  position:sticky;top:0;z-index:99;
  padding-top:env(safe-area-inset-top);
  box-shadow:0 4px 32px rgba(0,0,0,.5);
}
nav .brand{
  font-size:16px;font-weight:900;letter-spacing:1px;
  padding:15px 0;margin-left:auto;white-space:nowrap;
  background:linear-gradient(135deg,#ffd666,#f0c040,#d4a500);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 10px rgba(240,192,64,.35));
}
nav .nav-btn{
  background:none;border:none;color:#3a4a62;
  font-size:13px;font-weight:600;
  padding:17px 14px;cursor:pointer;
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
  transition:all .2s;white-space:nowrap;letter-spacing:.3px;
}
nav .nav-btn:hover{color:#b0c0d8;background:rgba(255,255,255,.03)}
nav .nav-btn.active{
  color:#f0c040;border-bottom-color:#f0c040;
  text-shadow:0 0 14px rgba(240,192,64,.55);
}
.user-info{display:flex;align-items:center;gap:8px;margin-right:10px;flex-shrink:0}
.user-info img{width:30px;height:30px;border-radius:50%;border:2px solid rgba(240,192,64,.25);box-shadow:0 0 10px rgba(240,192,64,.15)}
.user-info span{font-size:12px;color:#3a4a62;display:none}
@media(min-width:480px){.user-info span{display:block}}
.btn-signout{
  background:none;border:1px solid rgba(255,255,255,.08);
  color:#3a4a62;border-radius:8px;padding:5px 12px;
  font-size:11px;cursor:pointer;transition:all .2s;
}
.btn-signout:hover{border-color:rgba(248,81,73,.45);color:#f85149;background:rgba(248,81,73,.07)}

/* ══════════════════════════════════════════════ */
/* PAGES                                          */
/* ══════════════════════════════════════════════ */
.page{display:none;max-width:1480px;margin:0 auto;padding:30px 26px}
.page.active{display:block;animation:fadeUp .28s ease}

/* ══════════════════════════════════════════════ */
/* CARDS                                          */
/* ══════════════════════════════════════════════ */
.card{
  background:rgba(255,255,255,.034);
  border:1px solid rgba(255,255,255,.075);
  border-radius:18px;padding:26px 28px;margin-bottom:24px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  box-shadow:0 8px 40px rgba(0,0,0,.3);
  transition:border-color .3s,box-shadow .3s;
}
.card:hover{border-color:rgba(240,192,64,.14);box-shadow:0 12px 48px rgba(0,0,0,.4)}
.card-title{font-size:10px;color:#3a4a62;text-transform:uppercase;letter-spacing:2px;margin-bottom:22px;font-weight:700}

/* ══════════════════════════════════════════════ */
/* FORM                                           */
/* ══════════════════════════════════════════════ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(162px,1fr));gap:14px;align-items:end}
.field{display:flex;flex-direction:column;gap:7px}
.field label{font-size:10px;color:#3a4a62;text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.field input,.field select,.field textarea{
  background:rgba(255,255,255,.05);
  border:1.5px solid rgba(255,255,255,.09);
  border-radius:10px;color:#dde6f5;font-size:15px;
  padding:11px 14px;outline:none;
  transition:all .25s;width:100%;font-family:inherit;
  -webkit-appearance:none;appearance:none;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:rgba(240,192,64,.55);
  background:rgba(240,192,64,.04);
  box-shadow:0 0 0 3px rgba(240,192,64,.1);
}
.field textarea{resize:vertical;min-height:44px;max-height:100px}
select option{background:#0f1625}

/* ══════════════════════════════════════════════ */
/* SIDE TOGGLE                                    */
/* ══════════════════════════════════════════════ */
.side-toggle{
  display:flex;border:1.5px solid rgba(255,255,255,.09);
  border-radius:10px;overflow:hidden;height:44px;
  background:rgba(255,255,255,.03);
}
.side-btn{
  flex:1;border:none;background:none;
  color:#3a4a62;font-size:14px;font-weight:800;
  cursor:pointer;letter-spacing:1.5px;transition:all .25s;
}
.side-btn.buy.on{
  background:rgba(63,185,80,.16);color:#3fb950;
  box-shadow:inset 0 0 16px rgba(63,185,80,.08);
  text-shadow:0 0 12px rgba(63,185,80,.7);
}
.side-btn.sell.on{
  background:rgba(248,81,73,.16);color:#f85149;
  box-shadow:inset 0 0 16px rgba(248,81,73,.08);
  text-shadow:0 0 12px rgba(248,81,73,.7);
}
.side-btn:not(.on):hover{background:rgba(255,255,255,.06);color:#b0c0d8}

#f-profit.pos{border-color:rgba(63,185,80,.5);box-shadow:0 0 0 3px rgba(63,185,80,.1)}
#f-profit.neg{border-color:rgba(248,81,73,.5);box-shadow:0 0 0 3px rgba(248,81,73,.1)}

/* ══════════════════════════════════════════════ */
/* SUBMIT BUTTON                                  */
/* ══════════════════════════════════════════════ */
.btn-submit{
  background:linear-gradient(135deg,#ffd666 0%,#f0c040 55%,#c89800 100%);
  color:#07080f;border:none;border-radius:10px;
  padding:0 26px;font-size:15px;font-weight:900;
  cursor:pointer;transition:all .25s;
  white-space:nowrap;align-self:flex-end;
  height:44px;width:100%;
  box-shadow:0 4px 18px rgba(240,192,64,.28);
  letter-spacing:.5px;
}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(240,192,64,.45)}
.btn-submit:active{transform:scale(.97)}

/* ══════════════════════════════════════════════ */
/* STATS                                          */
/* ══════════════════════════════════════════════ */
.stats-row{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
  gap:14px;margin-bottom:24px;
}
.stat{
  background:rgba(255,255,255,.032);
  border:1px solid rgba(255,255,255,.07);
  border-radius:16px;padding:20px 18px 16px;
  position:relative;overflow:hidden;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:all .28s;
}
.stat:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.35)}
.stat::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:rgba(255,255,255,.06);
}
.stat .lbl{font-size:10px;color:#3a4a62;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;font-weight:700}
.stat .val{font-size:28px;font-weight:900;line-height:1;letter-spacing:-.5px}

.val.gold   {color:#f0c040;text-shadow:0 0 16px rgba(240,192,64,.45)}
.val.green  {color:#3fb950;text-shadow:0 0 16px rgba(63,185,80,.45)}
.val.red    {color:#f85149;text-shadow:0 0 16px rgba(248,81,73,.45)}
.val.neutral{color:#dde6f5}

/* ══════════════════════════════════════════════ */
/* TABLE                                          */
/* ══════════════════════════════════════════════ */
.tbl-wrap{
  background:rgba(255,255,255,.022);
  border:1px solid rgba(255,255,255,.065);
  border-radius:16px;overflow:hidden;overflow-x:auto;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
table{width:100%;border-collapse:collapse;min-width:520px}
thead th{
  padding:13px 16px;font-size:10px;color:#3a4a62;
  text-transform:uppercase;letter-spacing:1px;
  text-align:right;background:rgba(0,0,0,.22);
  border-bottom:1px solid rgba(255,255,255,.055);
  white-space:nowrap;font-weight:700;
}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
tbody tr:hover{background:rgba(240,192,64,.04)}
tbody tr:last-child{border-bottom:none}
tbody td{padding:12px 16px;font-size:14px;text-align:right;white-space:nowrap}

.badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.8px}
.badge.buy {background:rgba(63,185,80,.13); color:#3fb950;border:1px solid rgba(63,185,80,.22)}
.badge.sell{background:rgba(248,81,73,.13);color:#f85149;border:1px solid rgba(248,81,73,.22)}

.sym{
  background:rgba(240,192,64,.1);border:1px solid rgba(240,192,64,.18);
  border-radius:6px;padding:3px 9px;
  font-size:12px;font-weight:700;color:#f0c040;letter-spacing:.5px;
}
.p-pos{color:#3fb950;font-weight:700}
.p-neg{color:#f85149;font-weight:700}
.p-z  {color:#3a4a62}

.btn-del{
  background:none;border:none;color:rgba(255,255,255,.1);
  cursor:pointer;font-size:14px;padding:4px 8px;
  border-radius:6px;transition:all .2s;
}
.btn-del:hover{color:#f85149;background:rgba(248,81,73,.1)}

.empty{text-align:center;padding:56px 20px;color:#2e3a50;font-size:14px}
.empty .icon{font-size:42px;margin-bottom:14px;display:block;opacity:.55}

/* ══════════════════════════════════════════════ */
/* HISTORY                                        */
/* ══════════════════════════════════════════════ */
.month-group{margin-bottom:30px}
.month-label{
  font-size:16px;font-weight:800;color:#f0c040;
  margin-bottom:12px;padding-right:4px;
  text-shadow:0 0 12px rgba(240,192,64,.3);
}

/* ══════════════════════════════════════════════ */
/* PAGE HEADER                                    */
/* ══════════════════════════════════════════════ */
.page-header{margin-bottom:24px}
.page-header h2{
  font-size:23px;font-weight:900;
  background:linear-gradient(135deg,#dde6f5 0%,#8a9ab8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.page-header p{font-size:13px;color:#3a4a62;margin-top:5px}

/* ══════════════════════════════════════════════ */
/* MISC                                           */
/* ══════════════════════════════════════════════ */
.btn-danger{
  background:none;border:1px solid rgba(255,255,255,.08);
  color:#3a4a62;border-radius:8px;
  padding:8px 20px;font-size:12px;cursor:pointer;transition:all .2s;
}
.btn-danger:hover{border-color:rgba(248,81,73,.45);color:#f85149;background:rgba(248,81,73,.07)}

.toast{
  position:fixed;
  bottom:calc(26px + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%) translateY(20px);
  background:#238636;color:#fff;
  padding:12px 30px;border-radius:12px;
  font-size:14px;font-weight:700;
  opacity:0;transition:all .3s;
  pointer-events:none;z-index:999;white-space:nowrap;
  box-shadow:0 8px 28px rgba(0,0,0,.5);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══════════════════════════════════════════════ */
/* MOBILE                                         */
/* ══════════════════════════════════════════════ */
@media(max-width:600px){
  nav .brand   {font-size:14px}
  nav .nav-btn {font-size:11px;padding:14px 8px}
  .stat .val   {font-size:23px}
  .page        {padding:18px 14px}
  .card        {padding:18px 16px}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="screen-loading">
  <div class="spin"></div>
  <p>טוען...</p>
</div>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-card">
    <span class="icon">📈</span>
    <h1>יומן מסחר</h1>
    <p>התחבר עם חשבון Google שלך כדי לגשת ליומן מכל מכשיר — נייד, מחשב, טאבלט.</p>
    <button class="btn-google" onclick="signIn()">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.5 29.5 4 24 4 12.95 4 4 12.95 4 24s8.95 20 20 20 20-8.95 20-20c0-1.3-.1-2.6-.4-3.9z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.4 26.8 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.6 5.1C9.5 39.6 16.3 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.6l6.2 5.2C42.1 35.4 44 30 44 24c0-1.3-.1-2.6-.4-3.9z"/>
      </svg>
      התחבר עם Google
    </button>
    <p class="login-note">הנתונים מסונכרנים בין כל המכשירים שלך בזמן אמת</p>
  </div>
</div>

<!-- APP -->
<div id="screen-app">

  <nav>
    <button class="nav-btn active" onclick="goto('add')" id="nav-add">➕ הוסף</button>
    <button class="nav-btn" onclick="goto('week')" id="nav-week">📅 שבוע</button>
    <button class="nav-btn" onclick="goto('month')" id="nav-month">📆 חודש</button>
    <button class="nav-btn" onclick="goto('history')" id="nav-history">📋 היסטוריה</button>
    <div class="brand">📈 יומן מסחר</div>
    <div class="user-info">
      <img id="user-avatar" src="" style="display:none" alt="">
      <span id="user-name"></span>
      <button class="btn-signout" onclick="doSignOut()">יציאה</button>
    </div>
  </nav>

  <!-- ADD -->
  <div class="page active" id="page-add">
    <div class="page-header">
      <h2>הוסף עסקה חדשה</h2>
      <p id="today-label"></p>
    </div>
    <div class="card">
      <div class="card-title">פרטי העסקה</div>
      <div class="grid">

        <div class="field">
          <label>תאריך</label>
          <input type="date" id="f-date">
        </div>

        <div class="field">
          <label>מכשיר / זוג</label>
          <select id="f-sym" onchange="symChange()">
            <option value="XAUUSD">XAUUSD (זהב)</option>
            <option value="EURUSD">EURUSD</option>
            <option value="GBPUSD">GBPUSD</option>
            <option value="USDJPY">USDJPY</option>
            <option value="USDCAD">USDCAD</option>
            <option value="AUDUSD">AUDUSD</option>
            <option value="BTCUSD">BTCUSD</option>
            <option value="NAS100">NAS100</option>
            <option value="US30">US30</option>
            <option value="SP500">SP500</option>
            <option value="other">אחר (הכנס ידנית)...</option>
          </select>
          <input type="text" id="f-sym-custom" placeholder="הכנס סימבול..." style="display:none;margin-top:8px">
        </div>

        <div class="field">
          <label>כיוון</label>
          <div class="side-toggle">
            <button class="side-btn buy on" id="btn-buy" onclick="setSide('BUY')">BUY</button>
            <button class="side-btn sell" id="btn-sell" onclick="setSide('SELL')">SELL</button>
          </div>
          <input type="hidden" id="f-side" value="BUY">
        </div>

        <div class="field">
          <label>כמות לוט</label>
          <input type="number" id="f-lot" placeholder="0.01" step="0.01" min="0" max="999" inputmode="decimal">
        </div>

        <div class="field">
          <label>פיפסים</label>
          <input type="number" id="f-pips" placeholder="0.0" step="0.1" inputmode="decimal">
        </div>

        <div class="field">
          <label>רווח / הפסד ($)</label>
          <input type="number" id="f-profit" placeholder="0.00" step="0.01" oninput="colorProfit()" inputmode="decimal">
        </div>

        <div class="field">
          <label>הערות (אופציונלי)</label>
          <textarea id="f-notes" placeholder="אסטרטגיה, סיבה לכניסה..."></textarea>
        </div>

        <button class="btn-submit" onclick="addTrade()">✓ הוסף עסקה</button>

      </div>
    </div>
  </div>

  <!-- WEEK -->
  <div class="page" id="page-week">
    <div class="page-header">
      <h2>עסקאות השבוע</h2>
      <p id="week-range-label"></p>
    </div>
    <div class="stats-row" id="week-stats"></div>
    <div id="week-table"></div>
  </div>

  <!-- MONTH -->
  <div class="page" id="page-month">
    <div class="page-header">
      <h2>עסקאות החודש</h2>
      <p id="month-label"></p>
    </div>
    <div class="stats-row" id="month-stats"></div>
    <div id="month-table"></div>
  </div>

  <!-- HISTORY -->
  <div class="page" id="page-history">
    <div class="page-header">
      <h2>כל ההיסטוריה</h2>
      <p>כל העסקאות, מחולקות לפי חודש</p>
    </div>
    <div class="stats-row" id="hist-stats"></div>
    <div id="hist-content"></div>
    <div style="text-align:center;margin-top:20px">
      <button class="btn-danger" onclick="clearAll()">מחק את כל ההיסטוריה</button>
    </div>
  </div>

</div><!-- /app -->

<div class="toast" id="toast"></div>

<!-- ═══════════════ FIREBASE ═══════════════ -->
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

<script>
// ════════════════════════════════════════════════
//  FIREBASE CONFIG — החלף בפרטים שלך מ-Firebase
// ════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyBOzV0gReL8bK3wzy_CNwjBK-JdiU06gaU",
  authDomain:        "trading-journal-e5c8a.firebaseapp.com",
  projectId:         "trading-journal-e5c8a",
  storageBucket:     "trading-journal-e5c8a.firebasestorage.app",
  messagingSenderId: "876469741130",
  appId:             "1:876469741130:web:408a9820eaed1c3fbe8b3"
};
// ════════════════════════════════════════════════

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
db.enablePersistence().catch(() => {});

// ── state ──
let currentUser = null;
let trades = [];
let unsub  = null;
let activePage = 'add';

// ── screens ──
function showScreen(name) {
  document.getElementById('screen-loading').style.display = 'none';
  document.getElementById('screen-login').style.display  = name === 'login' ? 'flex' : 'none';
  document.getElementById('screen-app').style.display    = name === 'app'   ? 'block' : 'none';
}

// ── auth ──
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    const nameEl = document.getElementById('user-name');
    const avatarEl = document.getElementById('user-avatar');
    nameEl.textContent = (user.displayName || 'משתמש').split(' ')[0];
    if (user.photoURL) { avatarEl.src = user.photoURL; avatarEl.style.display = 'block'; }
    showScreen('app');
    startSync();
  } else {
    currentUser = null;
    if (unsub) { unsub(); unsub = null; }
    showScreen('login');
  }
});

function signIn() {
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
    .catch(e => toast('שגיאה: ' + e.message, '#da3633'));
}

function doSignOut() {
  if (confirm('להתנתק?')) auth.signOut();
}

// ── realtime sync ──
function tradesRef() {
  return db.collection('users').doc(currentUser.uid).collection('trades');
}

function startSync() {
  if (unsub) unsub();
  unsub = tradesRef().onSnapshot(snap => {
    trades = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderCurrentPage();
  }, err => console.error(err));
}

// ── init form ──
const now = new Date();
document.getElementById('f-date').value = now.toISOString().split('T')[0];
document.getElementById('today-label').textContent =
  now.toLocaleDateString('he-IL', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

// ── form helpers ──
function symChange() {
  const sel  = document.getElementById('f-sym');
  const cust = document.getElementById('f-sym-custom');
  cust.style.display = sel.value === 'other' ? 'block' : 'none';
  if (sel.value === 'other') cust.focus();
}

function setSide(s) {
  document.getElementById('f-side').value = s;
  document.getElementById('btn-buy').classList.toggle('on', s === 'BUY');
  document.getElementById('btn-sell').classList.toggle('on', s === 'SELL');
}

function colorProfit() {
  const el = document.getElementById('f-profit');
  const v  = parseFloat(el.value);
  el.classList.remove('pos','neg');
  if (v > 0) el.classList.add('pos');
  else if (v < 0) el.classList.add('neg');
}

function getSymbol() {
  const sel = document.getElementById('f-sym');
  if (sel.value === 'other') {
    return document.getElementById('f-sym-custom').value.trim().toUpperCase() || 'OTHER';
  }
  return sel.value;
}

// ── add trade ──
function addTrade() {
  if (!currentUser) return;
  const date   = document.getElementById('f-date').value;
  const symbol = getSymbol();
  const side   = document.getElementById('f-side').value;
  const lot    = parseFloat(document.getElementById('f-lot').value)    || 0;
  const pips   = parseFloat(document.getElementById('f-pips').value)   || 0;
  const profit = parseFloat(document.getElementById('f-profit').value) || 0;
  const notes  = document.getElementById('f-notes').value.trim();

  if (!date) { toast('בחר תאריך', '#da3633'); return; }

  tradesRef().add({ date, symbol, side, lot, pips, profit, notes,
    ts: firebase.firestore.FieldValue.serverTimestamp() })
  .then(() => {
    document.getElementById('f-lot').value    = '';
    document.getElementById('f-pips').value   = '';
    document.getElementById('f-profit').value = '';
    document.getElementById('f-notes').value  = '';
    document.getElementById('f-profit').classList.remove('pos','neg');
    toast('✓ העסקה נוספה!');
    setTimeout(() => goto('week'), 600);
  })
  .catch(e => toast('שגיאה: ' + e.message, '#da3633'));
}

// ── delete ──
function del(id) {
  tradesRef().doc(id).delete();
  toast('עסקה נמחקה', '#da3633');
}

function clearAll() {
  if (!confirm('למחוק את כל ההיסטוריה? פעולה זו אינה הפיכה.')) return;
  const batch = db.batch();
  trades.forEach(t => batch.delete(tradesRef().doc(t.id)));
  batch.commit();
  toast('כל ההיסטוריה נמחקה', '#da3633');
}

// ── navigation ──
function goto(page) {
  activePage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');
  if (page === 'week')    renderWeek();
  if (page === 'month')   renderMonth();
  if (page === 'history') renderHistory();
}

function renderCurrentPage() {
  if (activePage === 'week')    renderWeek();
  if (activePage === 'month')   renderMonth();
  if (activePage === 'history') renderHistory();
}

// ── date utils ──
function weekBounds(ref) {
  const d   = new Date(ref);
  const day = d.getDay();
  const start = new Date(d); start.setDate(d.getDate() - day); start.setHours(0,0,0,0);
  const end   = new Date(start); end.setDate(start.getDate() + 6); end.setHours(23,59,59,999);
  return { start, end };
}
function inWeek(ds) {
  const d = new Date(ds + 'T12:00:00');
  const { start, end } = weekBounds(new Date());
  return d >= start && d <= end;
}
function inMonth(ds) {
  const d = new Date(ds + 'T12:00:00'), n = new Date();
  return d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
}
function fmt(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

// ── stats ──
function stats(t) {
  const count  = t.length;
  const pips   = t.reduce((a,x) => a + x.pips, 0);
  const profit = t.reduce((a,x) => a + x.profit, 0);
  const wins   = t.filter(x => x.profit > 0).length;
  const losses = t.filter(x => x.profit < 0).length;
  const wr     = count > 0 ? Math.round(wins / count * 100) : 0;
  return { count, pips, profit, wins, losses, wr };
}

function statsHTML(s) {
  const pc = s.profit > 0 ? 'green' : s.profit < 0 ? 'red' : 'neutral';
  const ec = s.pips   > 0 ? 'green' : s.pips   < 0 ? 'red' : 'gold';
  return `
    <div class="stat"><div class="lbl">עסקאות</div><div class="val neutral">${s.count}</div></div>
    <div class="stat"><div class="lbl">פיפסים</div><div class="val ${ec}">${s.pips>=0?'+':''}${s.pips.toFixed(1)}</div></div>
    <div class="stat"><div class="lbl">רווח / הפסד</div><div class="val ${pc}">${s.profit>=0?'+':''}$${s.profit.toFixed(2)}</div></div>
    <div class="stat"><div class="lbl">WIN / LOSS</div><div class="val neutral"><span style="color:#3fb950;text-shadow:0 0 10px rgba(63,185,80,.5)">${s.wins}</span> / <span style="color:#f85149;text-shadow:0 0 10px rgba(248,81,73,.5)">${s.losses}</span></div></div>
    <div class="stat"><div class="lbl">אחוז הצלחה</div><div class="val ${s.wr>=50?'green':'red'}">${s.wr}%</div></div>`;
}

// ── table ──
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function tableHTML(t) {
  if (!t.length) return `<div class="empty"><span class="icon">📭</span>אין עסקאות בתקופה זו</div>`;
  const rows = [...t].sort((a,b) => b.date.localeCompare(a.date)).map(r => {
    const pc    = r.profit > 0 ? 'p-pos' : r.profit < 0 ? 'p-neg' : 'p-z';
    const ps    = r.profit > 0 ? '+' : '';
    const pis   = r.pips   > 0 ? '+' : '';
    const lot   = r.lot ? r.lot.toFixed(2) : '—';
    const note  = r.notes
      ? `<span style="color:#4a5a78;font-size:12px">${esc(r.notes)}</span>`
      : '<span style="color:#1e2a3a">—</span>';
    return `<tr>
      <td>${fmt(r.date)}</td>
      <td><span class="sym">${esc(r.symbol)}</span></td>
      <td><span class="badge ${r.side.toLowerCase()}">${r.side}</span></td>
      <td>${lot}</td>
      <td>${pis}${r.pips.toFixed(1)}</td>
      <td class="${pc}">${ps}$${r.profit.toFixed(2)}</td>
      <td>${note}</td>
      <td><button class="btn-del" onclick="del('${r.id}')">✕</button></td>
    </tr>`;
  }).join('');
  return `<div class="tbl-wrap"><table>
    <thead><tr>
      <th>תאריך</th><th>מכשיר</th><th>כיוון</th><th>לוט</th><th>פיפסים</th><th>רווח/הפסד</th><th>הערות</th><th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

// ── render pages ──
function renderWeek() {
  const t = trades.filter(x => inWeek(x.date));
  const s = stats(t);
  const { start, end } = weekBounds(new Date());
  document.getElementById('week-range-label').textContent =
    `${start.toLocaleDateString('he-IL',{day:'numeric',month:'long'})} – ${end.toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'})}`;
  document.getElementById('week-stats').innerHTML = statsHTML(s);
  document.getElementById('week-table').innerHTML = tableHTML(t);
}

function renderMonth() {
  const t = trades.filter(x => inMonth(x.date));
  const s = stats(t);
  document.getElementById('month-label').textContent =
    new Date().toLocaleDateString('he-IL', { month:'long', year:'numeric' });
  document.getElementById('month-stats').innerHTML = statsHTML(s);
  document.getElementById('month-table').innerHTML = tableHTML(t);
}

const HE_M = ['','ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

function renderHistory() {
  const s = stats(trades);
  document.getElementById('hist-stats').innerHTML = statsHTML(s);
  if (!trades.length) {
    document.getElementById('hist-content').innerHTML =
      `<div class="empty"><span class="icon">📋</span>עדיין אין עסקאות</div>`;
    return;
  }
  const groups = {};
  [...trades].sort((a,b)=>b.date.localeCompare(a.date)).forEach(t => {
    const [y,m] = t.date.split('-');
    const k = `${y}-${m}`;
    (groups[k] = groups[k] || []).push(t);
  });
  let html = '';
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(k => {
    const [y,m] = k.split('-');
    const ms = stats(groups[k]);
    const pc = ms.profit > 0 ? '#3fb950' : ms.profit < 0 ? '#f85149' : '#4a5a78';
    html += `<div class="month-group">
      <div class="month-label">
        ${HE_M[parseInt(m)]} ${y}
        <span style="font-size:12px;font-weight:500;color:#3a4a62;margin-right:10px">
          ${ms.count} עסקאות &nbsp;|&nbsp;
          <span style="color:${pc}">${ms.profit>=0?'+':''}$${ms.profit.toFixed(2)}</span> &nbsp;|&nbsp;
          ${ms.pips>=0?'+':''}${ms.pips.toFixed(1)} pips
        </span>
      </div>
      ${tableHTML(groups[k])}
    </div>`;
  });
  document.getElementById('hist-content').innerHTML = html;
}

// ── toast ──
function toast(msg, color='#238636') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.background = color;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

// ── service worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
